server:
  http_listen_port: 0
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://127.0.0.1:3100/loki/api/v1/push

scrape_configs:
  - job_name: Cerebro Systemd Log
    journal:
      max_age: 72h
      labels:
        job: Cerebro Logs
    relabel_configs:
      - source_labels: ["__journal__systemd_unit"]
        target_label: "unit"
